version: "3.9"

services:
  neo4j:
    image: neo4j:5.20-community
    container_name: rhizome-neo4j
    ports:
      - "7474:7474"   # Neo4j Browser (HTTP)
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/rhizome-secret
      # Enable APOC plugin (required for advanced graph algorithms)
      NEO4J_PLUGINS: '["apoc"]'
      # Enable vector index support (Neo4j 5.11+)
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "1G"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
      - ./schema.cypher:/docker-entrypoint-initdb.d/schema.cypher:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rhizome-backend
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: rhizome-secret
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./frontend:/frontend

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins:
